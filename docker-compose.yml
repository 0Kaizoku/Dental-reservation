services:
  db:
    image: mcr.microsoft.com/mssql/server:2019-latest
    environment:
      SA_PASSWORD: "Passw2025"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    healthcheck:
      test: [ "CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'Passw2025' -Q 'select 1'" ]
    volumes:
      - mssql_data:/var/opt/mssql

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    image: dental-reservation-api:latest
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      # Provide your own values via a .env file or CI secrets
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=CabinetD;User Id=sa;Password=Passw2025;TrustServerCertificate=True;"
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
    ports:
      - "5057:8080"

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    image: dental-reservation-web:latest
    depends_on:
      - api
    environment:
      # If you prefer building the frontend with a full URL instead of using nginx proxy,
      # you can pass VITE_API_BASE_URL at build time. Current setup proxies /api to the api service.
      # VITE_API_BASE_URL: http://localhost:5057/api
      # Keep runtime simple; nginx proxies /api/* to http://api:8080/api/*
       NODE_ENV : production
       EnableHttpsRedirection: "false"
    ports:
      - "8081:80"

volumes:
  mssql_data:
